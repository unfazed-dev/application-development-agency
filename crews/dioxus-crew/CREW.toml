name = "dioxus-crew"
version = "1.0.0"
description = "Dioxus stack specialist — Rust WASM presentation, signals state, navigation, testing"
layer = "frontend"
#
# Script path convention: `script` fields in agent contracts are relative to
# this CREW.toml's directory. Scripts live in `crews/<crew>/scripts/`.
# Example: script = "scripts/dioxus-gen-theme.sh" → crews/dioxus-crew/scripts/dioxus-gen-theme.sh

[author]
name = "pixel 77"

[[agents]]
role = "design-builder"
contract = "agents/presentation/design-builder.toml"

[[agents]]
role = "widget-composer"
contract = "agents/presentation/widget-composer.toml"

[[agents]]
role = "state-manager"
contract = "agents/application/state-manager.toml"

[[agents]]
role = "navigation-designer"
contract = "agents/application/navigation-designer.toml"

[[agents]]
role = "test-runner"
contract = "agents/quality/test-runner.toml"

[slots]
build-presentation = ["design-builder", "widget-composer", "state-manager", "navigation-designer"]
build-release = ["test-runner"]
validate-environment = ["test-runner"]
validate-design = ["test-runner"]
audit-structure = ["test-runner"]

[[routines]]
name = "default"
order = [
  "design-builder",
  "widget-composer",
  "state-manager",
  "navigation-designer",
  "test-runner",
]

[[tools]]
name = "file"
[tools.annotations]
read_only_hint = true
destructive_hint = false
idempotent_hint = true
open_world_hint = false

[[tools]]
name = "terminal"
[tools.annotations]
read_only_hint = false
destructive_hint = false
idempotent_hint = true
open_world_hint = false

[[tools]]
name = "web"
[tools.annotations]
read_only_hint = true
destructive_hint = false
idempotent_hint = true
open_world_hint = true
